name: Epic
description: For staff only - Create an epic
type: Epic
body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ RESTRICTED ACCESS

        **This form is restricted to Open Home Foundation staff, authorized contributors, and organization members only.**

        If you are a community member wanting to contribute:

        - For bug reports: Use the appropriate repository's bug report form
        - For feature requests: Submit to [Feature Requests](https://github.com/home-assistant/feature-requests)

        ---

        ### For authorized contributors
        Use this form to create epics - larger bodies of work consisting of multiple tasks that may span across multiple repositories.

  - type: textarea
    id: roadmap_opportunity
    attributes:
      label: Roadmap opportunity
      value: "This epic tracks the delivery of the following roadmap opportunity: "
    validations:
      required: true

  - type: textarea
    id: goal
    attributes:
      label: What are we trying to achieve?
      description: Briefly describe the problem we aim to solve.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: What are we shipping?
      description: List the concrete deliverables and features included in this epic.
      value: |
        - 
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: What does 'done' look like?
      description: Define the criteria for this epic to be considered complete.
    validations:
      required: true
