name: Epic
description: For OHF staff, authorized contributors, and organisation members only - Create an epic
type: Epic
body:
  - type: markdown
    attributes:
      value: |
        ## ⚠️ RESTRICTED ACCESS

        **This form is restricted to Open Home Foundation staff, authorized contributors, and organization members only.**

        If you are a community member wanting to contribute:

        - For bug reports: Use the appropriate repository's bug report form
        - For feature requests: Submit to [Feature Requests](https://github.com/home-assistant/feature-requests)

        ---

        ### For authorized contributors
        Use this form to create epics: larger bodies of work consisting of multiple tasks that may span across multiple repositories.
        
        Please make sure to add the necessary relationships (blocking to, blocked by, parents) in the sidebar on the right after creation.

  - type: textarea
    id: roadmap_opportunity
    attributes:
      label: Roadmap opportunity
      value: "This epic tracks the delivery of the following roadmap opportunity: "
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Briefly describe the problem to solve and the desired outcome.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Deliverables/features
      description: List the concrete deliverables and features included in this epic.
      value: |
        - 
    validations:
      required: true

  - type: textarea
    id: done
    attributes:
      label: Completion criteria
      description: Define the criteria for this epic to be considered complete.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: |
        Any additional information, links, research, or context that would be helpful.
        Include links to related feature requests, design documents, research, Discord channel, etc.
      placeholder: |
        - Feature request: [link]
        - Technical design documents: [link]
        - Research: [link]
        - Discord channel: [link]
    validations:
      required: false
